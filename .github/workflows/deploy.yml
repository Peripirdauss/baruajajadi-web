name: Deploy to Rumahweb

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{secrets.NEXT_PUBLIC_APP_URL}}
          DB_HOST: ${{secrets.DB_HOST}}
          DB_USER: ${{secrets.DB_USER}}
          DB_PASSWORD: ${{secrets.DB_PASSWORD}}
          DB_NAME: ${{secrets.DB_NAME}}
          JWT_SECRET: ${{secrets.JWT_SECRET}}

      - name: Prepare Deployment Artifacts
        run: |
          # Create a clean deployment directory
          mkdir -p deploy_dist
          
          # 1. Copy standalone server and minimal node_modules
          cp -r .next/standalone/. deploy_dist/
          
          # 2. Copy static assets (required by standalone mode)
          mkdir -p deploy_dist/public
          cp -r public/. deploy_dist/public/
          
          mkdir -p deploy_dist/.next/static
          cp -r .next/static/. deploy_dist/.next/static/
          
          # 3. Copy custom configurations
          cp server.js deploy_dist/
          cp .htaccess deploy_dist/
          
          # 4. Create restart token
          mkdir -p deploy_dist/tmp
          date > deploy_dist/tmp/restart.txt

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{secrets.FTP_SERVER}}
          username: ${{secrets.FTP_USERNAME}}
          password: ${{secrets.FTP_PASSWORD}}
          protocol: ftp
          port: 21
          # Target only the optimized artifacts folder
          local-dir: ./deploy_dist/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-v2.json
          timeout: 600000
          log-level: verbose
          # Exclude files that aren't needed even in dist
          exclude: |
            **/.git*
            **/.git*/**
            .env*
